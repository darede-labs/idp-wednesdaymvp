<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wednesdaymvp</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }
      .navbar { background: #0f3460; color: white; padding: 0.75rem 2rem; display: flex; align-items: center; }
      .navbar h1 { font-size: 1.1rem; font-weight: 600; }
      .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
      .card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
      .card h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #16213e; }
      .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
      button { padding: 0.6rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; }
      .btn-primary { background: #0f3460; color: white; }
      .btn-primary:hover { background: #16213e; }
      .btn-secondary { background: #e2e8f0; color: #333; }
      .btn-secondary:hover { background: #cbd5e1; }
      .btn-success { background: #059669; color: white; }
      .btn-success:hover { background: #047857; }
      input[type="email"] { padding: 0.6rem; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; flex: 1; min-width: 200px; }
      .form-row { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
      pre { background: #1a1a2e; color: #a5d8ff; padding: 1rem; border-radius: 8px; overflow: auto; font-size: 0.85rem; max-height: 300px; margin-top: 1rem; }
      .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 600; }
      .status-ok { background: #d1fae5; color: #065f46; }
      .status-err { background: #fee2e2; color: #991b1b; }
      .status-wait { background: #fef3c7; color: #92400e; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <nav class="navbar"><h1>wednesdaymvp</h1></nav>
    <div class="container">
      <div class="card">
        <h2>Health Check</h2>
        <div class="actions">
          <button id="healthBtn" class="btn-primary">GET /api/health</button>
          <span id="healthStatus" class="status status-wait">not checked</span>
        </div>
        <pre id="healthOutput" class="hidden"></pre>
      </div>
      <div class="card">
        <h2>Users</h2>
        <div class="form-row">
          <input type="email" id="emailInput" placeholder="user@example.com" />
          <button id="addUserBtn" class="btn-success">Add User</button>
        </div>
        <div class="actions">
          <button id="listUsersBtn" class="btn-secondary">List Users</button>
        </div>
        <pre id="usersOutput" class="hidden"></pre>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
