name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  APP_NAME: wednesdaymvp
  BUCKET_NAME: idp-wednesdaymvp-static
  S3_ORIGIN: idp-wednesdaymvp-static.s3.us-east-1.amazonaws.com

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::948881762705:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for S3 bucket (Crossplane provisioning)
        id: wait-bucket
        run: |
          BUCKET_NAME="${{ env.BUCKET_NAME }}"
          MAX_ATTEMPTS=45
          ATTEMPT=0

          echo "⏳ Waiting for S3 bucket: $BUCKET_NAME"
          echo "📦 Created by Crossplane via StaticWebsite claim"
          echo "🔄 ArgoCD → Crossplane → AWS S3 (first time: 5-15 min)"
          echo ""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
              echo "✅ Bucket is ready: $BUCKET_NAME"
              echo "bucket-exists=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            ELAPSED=$((ATTEMPT * 20))
            echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS (${ELAPSED}s): bucket not ready, waiting 20s..."
            sleep 20
          done

          echo "❌ Timeout: bucket not created after 15 minutes"
          echo "bucket-exists=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Deploy static files to S3
        if: ${{ steps.wait-bucket.outputs.bucket-exists == 'true' }}
        run: |
          aws s3 sync frontend/ "s3://${{ env.BUCKET_NAME }}/" --delete

      - name: Wait for CloudFront distribution (Crossplane provisioning)
        id: wait-dist
        if: ${{ steps.wait-bucket.outputs.bucket-exists == 'true' }}
        run: |
          S3_ORIGIN="${{ env.S3_ORIGIN }}"
          MAX_ATTEMPTS=60
          ATTEMPT=0

          echo "⏳ Waiting for CloudFront distribution..."
          echo "🔍 Looking for distribution with S3 origin: $S3_ORIGIN"
          echo ""

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?Origins.Items[0].DomainName=='$S3_ORIGIN'].Id | [0]" \
              --output text 2>/dev/null || echo "None")

            if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
              STATUS=$(aws cloudfront get-distribution --id "$DIST_ID" \
                --query "Distribution.Status" --output text 2>/dev/null || echo "UNKNOWN")

              if [ "$STATUS" = "Deployed" ]; then
                CF_DOMAIN=$(aws cloudfront get-distribution --id "$DIST_ID" \
                  --query "Distribution.DomainName" --output text 2>/dev/null || echo "")
                echo "✅ CloudFront distribution deployed: $DIST_ID"
                echo "🌐 URL: https://$CF_DOMAIN"
                echo "dist-id=$DIST_ID" >> $GITHUB_OUTPUT
                echo "cf-domain=$CF_DOMAIN" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "⏳ Distribution $DIST_ID found but status=$STATUS, waiting..."
            else
              echo "⏳ Distribution not found yet (attempt $((ATTEMPT+1))/$MAX_ATTEMPTS)"
            fi

            ATTEMPT=$((ATTEMPT + 1))
            sleep 20
          done

          echo "❌ Timeout: CloudFront distribution not ready after 20 minutes"
          echo "   Re-run workflow after Crossplane finishes provisioning."
          exit 1

      - name: Invalidate CloudFront cache
        if: ${{ steps.wait-dist.outputs.dist-id != '' }}
        run: |
          DIST_ID="${{ steps.wait-dist.outputs.dist-id }}"
          echo "Creating CloudFront invalidation for $DIST_ID..."
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          echo "✅ CloudFront invalidation created"

      - name: Deployment summary
        if: ${{ steps.wait-dist.outputs.dist-id != '' }}
        run: |
          echo "═══════════════════════════════════════"
          echo "✅ Frontend deployed successfully"
          echo "═══════════════════════════════════════"
          echo "📦 Bucket: ${{ env.BUCKET_NAME }}"
          echo "🌐 Distribution: ${{ steps.wait-dist.outputs.dist-id }}"
          echo "🔗 URL: https://${{ steps.wait-dist.outputs.cf-domain }}"
          echo "═══════════════════════════════════════"
